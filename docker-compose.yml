version: '3.8'

services:
  palworld-starter:
    build: .
    container_name: palworld-starter
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Mount Docker socket so the app can manage Palworld containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount data directory so the remaining time state survives restarts
      - ./data:/data
    environment:
      - STATE_DIR=/data
      - DOCKER_CONTAINER_NAME=palworld-server
      - REST_API_HOST=palworld-server
    networks:
      - default
      - test_server

networks:
  test_server:
    external: true
    name: palworld-test-server_default
