<!DOCTYPE html>
<html lang="{{ .Language }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}Palworld Server Control{{ end }}</title>
    <link rel="icon" href="/static/5.ico" type="image/x-icon">
    <link rel="stylesheet" href="/static/style.css">
    {{ block "head" . }}{{ end }}
</head>
<body class="full-bg">
    <header class="site-header">
        <h1 class="logo">Palworld Server Control</h1>
    </header>

    <!-- Discord Floating Action Button -->
    <a href="{{ .DiscordUrl }}" target="_blank" class="discord-fab" title="Join our Discord">
        <img src="/static/discord-logo.webp" alt="Discord" class="discord-icon">
        <span class="tooltip">Join Discord</span>
    </a>

    <main class="page-content">
        {{ block "content" . }}{{ end }}
    </main>

    {{ block "scripts" . }}{{ end }}
</body>
</html>
