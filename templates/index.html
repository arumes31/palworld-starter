{% extends "base.html" %}
{% block title %}{{ docker_container_name }} – {{ status|title }}{% endblock %}

{% block content %}
<div class="glass-card">
    <div class="status-header">
        <h2 class="status-title">
            {{ docker_container_name }}
            <span class="status-badge {{ status }}">{{ status|title }}</span>
        </h2>
    </div>

    <div class="status-block">
        <div class="info-row">
            <span class="label">
                Remaining Time:
                <i class="info-icon" title="The server is only paused and can be reactivated here at any time.">Info</i>
            </span>
            <span id="remaining-time" class="value"></span>
        </div>
        <div class="info-row">
            <span class="label">Server IP:</span>
            <span id="server-ip" class="copyable value">80.66.59.216:8211</span>
            <span id="copy-toast" class="toast">Copied!</span>
        </div>
        <div class="actions">
            <a href="{{ url_for('captcha') }}" id="add-time-link" class="btn-primary">+4 Hours</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const timeRemaining = {{ time_remaining | tojson }};
    const status = "{{ status }}";

    function formatTime(sec) {
        const h = Math.floor(sec / 3600).toString().padStart(2, '0');
        const m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        return `${h}h ${m}m ${s}s`;
    }

    function startCountdown() {
        let left = timeRemaining;
        const el = document.getElementById('remaining-time');
        const update = () => {
            if (left >= 0) {
                el.textContent = formatTime(left--);
                setTimeout(update, 1000);
            } else {
                el.textContent = "Time is up!";
            }
        };
        update();
    }

    function copyIP() {
        const text = document.getElementById('server-ip').textContent;
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        });
    }

    function initUI() {
        if (status === 'running') {
            document.querySelectorAll('.info-row').forEach(row => row.style.display = 'flex');
            startCountdown();
        }
    }

    document.getElementById('server-ip')?.addEventListener('click', copyIP);
    initUI();
</script>
{% endblock %}
